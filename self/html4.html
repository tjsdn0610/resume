<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .containers{
            width: 1400px;
            height: 786px;
            margin: 30px auto;
            background-color: black;
            position: relative;
        }
        h1{
            color:white;
            font-size: 50px;
            position: absolute;
            top: 200px;
            left: 100px;
        }.game{
            position : absolute;
            top: 580px;
            left: 100px;
            font-size: 24px;
        }
        .baseball{
            position : absolute;
            top: 580px;
            left: 850px;
            font-size: 24px;
        }
        
    </style>
</head>
<body>
    <div class="containers"></div>
    <h1>취미와 관심사</h1>
    <img src="게임.png" alt="" style="position: absolute; top: 350px; left: 100px; width: 370px; height: 230px;">
    <img src="야구.png" alt="" style="position: absolute; top: 350px; left: 850px; width: 370px; height: 230px;">
    <div class ="game" style="color:white; font-weight: bold;"><p>게임(롤)</p></div>
    <div class ="baseball" style="color:white; font-weight: bold;"><p>야구</p></div>
</body>
</html>
